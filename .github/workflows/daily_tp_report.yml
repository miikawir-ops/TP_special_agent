name: Daily TP Special Agent Report

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, classify and render TP report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_agent.py

      - name: Commit and push report
        run: |
          git config user.name "TP-Agent-Bot"
          git config user.email "tp-agent@noreply.github.com"
          git add tp_report.html
          git diff --cached --quiet || git commit -m "TP report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push