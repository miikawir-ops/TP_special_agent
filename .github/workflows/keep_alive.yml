name: Keep Workflows Active
 
# Runs weekly to prevent GitHub from disabling scheduled workflows
# due to repository inactivity (GitHub disables cron after 60 days
# of no human commits, but this workflow resets that timer)
 
on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 06:00 Helsinki time
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Keep workflows active
        run: |
          git config user.name "TP-Agent-Bot"
          git config user.email "tp-agent@noreply.github.com"
          echo "Workflows kept active: $(date -u '+%Y-%m-%d')" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "Keep workflows active $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push || echo "Nothing to push"
